<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 205">
  <style>
    .bg { fill: #f8f9fa; }
    .node { fill: #fff; stroke-width: 1.8; }
    .node-in { stroke: #1890ff; }
    .node-h { stroke: #52c41a; }
    .node-out { stroke: #fa8c16; }
    .node-loss { stroke: #cf1322; }
    .label { font-family: 'Georgia', serif; font-size: 11px; fill: #333; font-style: italic; text-anchor: middle; }
    .fwd-label { font-family: 'Georgia', serif; font-size: 8.5px; fill: #aaa; font-style: italic; text-anchor: middle; }
    .fwd-line { stroke: #ccc; stroke-width: 1; fill: none; }
    .bwd-line { stroke: #cf1322; stroke-width: 1.4; fill: none; stroke-dasharray: 5,3; }
    .grad-label { font-family: 'Georgia', serif; font-size: 9px; fill: #cf1322; font-style: italic; text-anchor: middle; }
    .grad-val { font-family: 'Georgia', serif; font-size: 10.5px; fill: #cf1322; font-style: italic; text-anchor: middle; font-weight: bold; }
    .rule { font-family: 'Arial', sans-serif; font-size: 7.5px; fill: #999; text-anchor: middle; }
    .anno { font-family: 'Arial', sans-serif; font-size: 9px; fill: #999; text-anchor: middle; }
  </style>
  <defs>
    <marker id="af" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#ccc"/>
    </marker>
    <marker id="ab" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#cf1322"/>
    </marker>
  </defs>

  <rect width="430" height="205" class="bg"/>

  <!-- Nodes at x = 55, 135, 215, 295, 375.  y = 55. -->

  <!-- x -->
  <circle cx="55" cy="55" r="20" class="node node-in"/>
  <text x="55" y="52" class="label" style="fill:#1890ff">x</text>
  <text x="55" y="64" class="fwd-label" style="fill:#1890ff">= 2</text>

  <!-- z1 -->
  <circle cx="135" cy="55" r="20" class="node node-h"/>
  <text x="135" y="52" class="label" style="fill:#389e0d">z₁</text>
  <text x="135" y="64" class="fwd-label">= 1.0</text>

  <!-- h -->
  <circle cx="215" cy="55" r="20" class="node node-h"/>
  <text x="215" y="52" class="label" style="fill:#389e0d">h</text>
  <text x="215" y="64" class="fwd-label">= 1.0</text>

  <!-- y_hat -->
  <circle cx="295" cy="55" r="20" class="node node-out"/>
  <text x="295" y="52" class="label" style="fill:#d46b08">ŷ</text>
  <text x="295" y="64" class="fwd-label">= −0.3</text>

  <!-- L -->
  <circle cx="375" cy="55" r="20" class="node node-loss"/>
  <text x="375" y="52" class="label" style="fill:#cf1322">L</text>
  <text x="375" y="64" class="fwd-label" style="fill:#cf1322">= 1.69</text>

  <!-- ===== FORWARD ARROWS (above center line, y=40) ===== -->
  <line x1="75" y1="42" x2="113" y2="42" class="fwd-line" marker-end="url(#af)"/>
  <text x="95" y="35" class="fwd-label">w₁ = 0.5</text>

  <line x1="155" y1="42" x2="193" y2="42" class="fwd-line" marker-end="url(#af)"/>
  <text x="175" y="35" class="fwd-label">ReLU</text>

  <line x1="235" y1="42" x2="273" y2="42" class="fwd-line" marker-end="url(#af)"/>
  <text x="255" y="35" class="fwd-label">w₂ = −0.3</text>

  <line x1="315" y1="42" x2="353" y2="42" class="fwd-line" marker-end="url(#af)"/>
  <text x="335" y="35" class="fwd-label">(ŷ − y)²</text>

  <!-- ===== BACKWARD ARROWS (below center line, y=69) ===== -->
  <line x1="353" y1="69" x2="317" y2="69" class="bwd-line" marker-end="url(#ab)"/>
  <text x="335" y="82" class="rule">× 2(ŷ − y)</text>

  <line x1="273" y1="69" x2="237" y2="69" class="bwd-line" marker-end="url(#ab)"/>
  <text x="255" y="82" class="rule">× w₂ (−0.3)</text>

  <line x1="193" y1="69" x2="157" y2="69" class="bwd-line" marker-end="url(#ab)"/>
  <text x="175" y="82" class="rule">× ReLU'  = 1</text>

  <line x1="113" y1="69" x2="77" y2="69" class="bwd-line" marker-end="url(#ab)"/>
  <text x="95" y="82" class="rule">× x (= 2)</text>

  <!-- ===== GRADIENT VALUES below each node ===== -->
  <text x="375" y="102" class="grad-label">∂L/∂ŷ</text>
  <text x="375" y="115" class="grad-val">−2.6</text>

  <text x="295" y="102" class="grad-label">∂L/∂h</text>
  <text x="295" y="115" class="grad-val">0.78</text>

  <text x="215" y="102" class="grad-label">δ₁</text>
  <text x="215" y="115" class="grad-val">0.78</text>

  <text x="135" y="102" class="grad-label">∂L/∂w₁</text>
  <text x="135" y="115" class="grad-val">1.56</text>

  <!-- ===== BOTTOM: four rules ===== -->
  <line x1="30" y1="135" x2="400" y2="135" stroke="#e8e8e8" stroke-width="0.7"/>

  <text x="215" y="152" class="anno" style="font-size:9.5px;fill:#666">The pattern at every layer:</text>
  <text x="120" y="170" class="anno" style="fill:#555">weight gradient = error × activation</text>
  <text x="315" y="170" class="anno" style="fill:#555">error backward = error × connection weight</text>
  <text x="120" y="185" class="anno" style="fill:#555">bias gradient = error</text>
  <text x="315" y="185" class="anno" style="fill:#555">ReLU: pass if active, block if off</text>
</svg>
