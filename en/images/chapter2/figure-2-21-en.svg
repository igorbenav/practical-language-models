<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 150">
  <style>
    .bg { fill: #f8f9fa; }
    .box { fill: #fff; rx: 5; ry: 5; stroke-width: 1.5; }
    .box-in { stroke: #1890ff; }
    .box-h { stroke: #52c41a; }
    .box-out { stroke: #fa8c16; }
    .box-loss { stroke: #cf1322; }
    .label { font-family: 'Georgia', serif; font-size: 12px; fill: #333; font-style: italic; text-anchor: middle; }
    .shape { font-family: 'Arial', sans-serif; font-size: 8px; fill: #999; text-anchor: middle; }
    .op { font-family: 'Georgia', serif; font-size: 8.5px; fill: #555; font-style: italic; text-anchor: middle; }
    .w-shape { font-family: 'Arial', sans-serif; font-size: 7.5px; fill: #1890ff; text-anchor: middle; font-weight: bold; }
    .anno { font-family: 'Arial', sans-serif; font-size: 9px; fill: #999; text-anchor: middle; }
    .dim { font-family: 'Arial', sans-serif; font-size: 9.5px; font-weight: bold; text-anchor: middle; }
    .conn { stroke: #bbb; stroke-width: 1.2; fill: none; }
  </style>
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#bbb"/>
    </marker>
  </defs>

  <rect width="490" height="150" class="bg"/>

  <!-- ===== NODES at y=50 center ===== -->

  <!-- x -->
  <rect x="14" y="33" width="38" height="34" class="box box-in"/>
  <text x="33" y="55" class="label" style="fill:#1890ff">x</text>
  <text x="33" y="78" class="shape">784 × 1</text>

  <!-- Arrow: x → z1 -->
  <line x1="52" y1="50" x2="98" y2="50" class="conn" marker-end="url(#arr)"/>
  <text x="75" y="43" class="op">W₁ᵀx + b₁</text>
  <text x="75" y="31" class="w-shape">(128 × 784)</text>

  <!-- z1 -->
  <rect x="103" y="33" width="34" height="34" class="box box-h"/>
  <text x="120" y="55" class="label" style="fill:#389e0d">z₁</text>
  <text x="120" y="78" class="shape">128 × 1</text>

  <!-- Arrow: z1 → h -->
  <line x1="137" y1="50" x2="169" y2="50" class="conn" marker-end="url(#arr)"/>
  <text x="153" y="43" class="op">ReLU</text>

  <!-- h -->
  <rect x="174" y="33" width="34" height="34" class="box box-h"/>
  <text x="191" y="55" class="label" style="fill:#389e0d">h</text>
  <text x="191" y="78" class="shape">128 × 1</text>

  <!-- Arrow: h → z2 -->
  <line x1="208" y1="50" x2="254" y2="50" class="conn" marker-end="url(#arr)"/>
  <text x="231" y="43" class="op">W₂ᵀh + b₂</text>
  <text x="231" y="31" class="w-shape">(10 × 128)</text>

  <!-- z2 -->
  <rect x="259" y="33" width="34" height="34" class="box box-out"/>
  <text x="276" y="55" class="label" style="fill:#d46b08">z₂</text>
  <text x="276" y="78" class="shape">10 × 1</text>

  <!-- Arrow: z2 → y_hat -->
  <line x1="293" y1="50" x2="333" y2="50" class="conn" marker-end="url(#arr)"/>
  <text x="313" y="43" class="op">softmax</text>

  <!-- y_hat -->
  <rect x="338" y="33" width="34" height="34" class="box box-out"/>
  <text x="355" y="55" class="label" style="fill:#d46b08">ŷ</text>
  <text x="355" y="78" class="shape">10 × 1</text>

  <!-- Arrow: y_hat → L -->
  <line x1="372" y1="50" x2="412" y2="50" class="conn" marker-end="url(#arr)"/>
  <text x="392" y="43" class="op">−log(ŷₖ)</text>

  <!-- L -->
  <rect x="417" y="33" width="38" height="34" class="box box-loss"/>
  <text x="436" y="55" class="label" style="fill:#cf1322">L</text>
  <text x="436" y="78" class="shape">scalar</text>

  <!-- ===== DIMENSION ROW: colored numbers showing the shrinking ===== -->
  <text x="33" y="98" class="dim" style="fill:#1890ff">784</text>
  <line x1="49" y1="95" x2="106" y2="95" stroke="#e0e0e0" stroke-width="0.7"/>
  <text x="120" y="98" class="dim" style="fill:#52c41a">128</text>
  <line x1="134" y1="95" x2="177" y2="95" stroke="#e0e0e0" stroke-width="0.7"/>
  <text x="191" y="98" class="dim" style="fill:#52c41a">128</text>
  <line x1="205" y1="95" x2="262" y2="95" stroke="#e0e0e0" stroke-width="0.7"/>
  <text x="276" y="98" class="dim" style="fill:#d46b08">10</text>
  <line x1="286" y1="95" x2="341" y2="95" stroke="#e0e0e0" stroke-width="0.7"/>
  <text x="355" y="98" class="dim" style="fill:#d46b08">10</text>
  <line x1="365" y1="95" x2="420" y2="95" stroke="#e0e0e0" stroke-width="0.7"/>
  <text x="436" y="98" class="dim" style="fill:#cf1322">1</text>

  <!-- ===== BOTTOM CAPTION ===== -->
  <text x="245" y="125" class="anno" style="font-size:10px;fill:#666">Each matrix multiplication changes the dimension. Weight matrix shapes shown above the arrows.</text>
  <text x="245" y="140" class="anno" style="font-size:9px;fill:#aaa">784 pixels → 128 learned features → 10 class scores → 1 loss value</text>
</svg>
