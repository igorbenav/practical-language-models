<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200">
  <style>
    .bg { fill: #f8f9fa; }
    .node { fill: #fff; stroke-width: 2; }
    .node-in { stroke: #1890ff; }
    .node-h { stroke: #52c41a; }
    .node-out { stroke: #fa8c16; }
    .node-loss { stroke: #cf1322; }
    .label { font-family: 'Georgia', serif; font-size: 12px; fill: #333; font-style: italic; text-anchor: middle; }
    .val { font-family: 'Georgia', serif; font-size: 10px; fill: #555; font-style: italic; text-anchor: middle; }
    .weight { font-family: 'Georgia', serif; font-size: 9.5px; fill: #1890ff; font-style: italic; text-anchor: middle; }
    .bias { font-family: 'Georgia', serif; font-size: 9px; fill: #888; font-style: italic; text-anchor: middle; }
    .op { font-family: 'Georgia', serif; font-size: 9px; fill: #666; font-style: italic; text-anchor: middle; }
    .anno { font-family: 'Arial', sans-serif; font-size: 9px; fill: #999; text-anchor: middle; }
    .anno-b { font-family: 'Arial', sans-serif; font-size: 9.5px; fill: #666; font-weight: bold; text-anchor: middle; }
    .conn { stroke: #bbb; stroke-width: 1.5; fill: none; }
    .target-line { stroke: #cf1322; stroke-width: 1; stroke-dasharray: 3,2; fill: none; }
  </style>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#bbb"/>
    </marker>
  </defs>

  <rect width="520" height="200" class="bg"/>

  <!-- ===== INPUT ===== -->
  <circle cx="52" cy="90" r="22" class="node node-in"/>
  <text x="52" y="87" class="label" style="fill:#1890ff">x</text>
  <text x="52" y="101" class="val" style="fill:#1890ff">= 2</text>
  <text x="52" y="148" class="anno-b">input</text>

  <!-- Arrow: input → z1 -->
  <line x1="74" y1="90" x2="118" y2="90" class="conn" marker-end="url(#arr)"/>
  <text x="96" y="80" class="weight">w₁ = 0.5</text>

  <!-- ===== Z1 (linear) ===== -->
  <circle cx="142" cy="90" r="22" class="node node-h"/>
  <text x="142" y="87" class="label" style="fill:#389e0d">z₁</text>
  <text x="142" y="101" class="val">= 1.0</text>
  <!-- bias annotation -->
  <text x="142" y="135" class="bias">b₁ = 0</text>
  <line x1="142" y1="112" x2="142" y2="127" stroke="#ccc" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Arrow: z1 → h -->
  <line x1="164" y1="90" x2="208" y2="90" class="conn" marker-end="url(#arr)"/>
  <text x="186" y="80" class="op">ReLU</text>

  <!-- ===== H (after ReLU) ===== -->
  <circle cx="232" cy="90" r="22" class="node node-h"/>
  <text x="232" y="87" class="label" style="fill:#389e0d">h</text>
  <text x="232" y="101" class="val">= 1.0</text>
  <text x="190" y="148" class="anno-b">hidden neuron</text>

  <!-- Arrow: h → y_hat -->
  <line x1="254" y1="90" x2="298" y2="90" class="conn" marker-end="url(#arr)"/>
  <text x="276" y="80" class="weight">w₂ = −0.3</text>

  <!-- ===== Y_HAT ===== -->
  <circle cx="322" cy="90" r="22" class="node node-out"/>
  <text x="322" y="87" class="label" style="fill:#d46b08">ŷ</text>
  <text x="322" y="101" class="val">= −0.3</text>
  <text x="322" y="148" class="anno-b">prediction</text>
  <!-- bias annotation -->
  <text x="322" y="135" class="bias">b₂ = 0</text>
  <line x1="322" y1="112" x2="322" y2="127" stroke="#ccc" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Arrow: y_hat → L -->
  <line x1="344" y1="90" x2="398" y2="90" class="conn" marker-end="url(#arr)"/>
  <text x="371" y="80" class="op">(ŷ − y)²</text>

  <!-- ===== LOSS ===== -->
  <circle cx="422" cy="90" r="22" class="node node-loss"/>
  <text x="422" y="87" class="label" style="fill:#cf1322">L</text>
  <text x="422" y="101" class="val" style="fill:#cf1322">= 1.69</text>
  <text x="422" y="148" class="anno-b" style="fill:#cf1322">loss</text>

  <!-- ===== TARGET ===== -->
  <text x="470" y="66" class="val" style="fill:#cf1322">y = 1</text>
  <text x="470" y="79" class="anno" style="fill:#cf1322">(target)</text>
  <line x1="450" y1="72" x2="444" y2="82" class="target-line"/>

  <!-- ===== BOTTOM CAPTION ===== -->
  <text x="260" y="182" class="anno" style="font-size:10px;fill:#666">Four weights, one input, one hidden neuron, one output. Small enough to trace by hand.</text>
</svg>
