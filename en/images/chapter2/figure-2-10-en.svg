<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 280">
  <style>
    .bg { fill: #f8f9fa; }
    .axis { stroke: #bbb; stroke-width: 1; }
    .floor-edge { stroke: #ddd; stroke-width: 0.8; stroke-dasharray: 3,3; }
    .lift-line { stroke: #999; stroke-width: 1; stroke-dasharray: 4,3; }
    .plane { fill: #333; fill-opacity: 0.07; stroke: #999; stroke-width: 0.8; stroke-dasharray: 2,2; }
    .axis-label {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 11px;
      fill: #555;
      font-style: italic;
    }
    .point-0 { fill: #1890ff; }
    .point-1 { fill: #fa8c16; }
    .ghost { fill: #1890ff; opacity: 0.2; }
    .anno {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9px;
      fill: #666;
    }
    .anno-bold {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      fill: #333;
      font-weight: bold;
    }
    .tick {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 9px;
      fill: #999;
    }
  </style>

  <rect width="340" height="280" class="bg"/>

  <!--
    3D projection: origin at (170, 218)
    x1 axis → lower-right
    x2 axis → lower-left
    x3 axis → straight up

    project(x1, x2, x3):
      px = 170 + (x1 - x2) * 55
      py = 218 - (x1 + x2) * 25 - x3 * 70

    Points:
      (0,0,0) → (170, 218)
      (0,1,0) → (115, 193)
      (1,0,0) → (225, 193)
      (1,1,0) → (170, 168)  [ghost]
      (1,1,1) → (170, 98)   [lifted]

    Plane at x3=0.5:
      (0,0,.5) → (170, 183)
      (1,0,.5) → (225, 158)
      (1,1,.5) → (170, 133)
      (0,1,.5) → (115, 158)
  -->

  <!-- Floor: unit square at x3=0 -->
  <line x1="170" y1="218" x2="225" y2="193" class="floor-edge"/>
  <line x1="170" y1="218" x2="115" y2="193" class="floor-edge"/>
  <line x1="225" y1="193" x2="170" y2="168" class="floor-edge"/>
  <line x1="115" y1="193" x2="170" y2="168" class="floor-edge"/>

  <!-- Axes -->
  <line x1="170" y1="218" x2="248" y2="182" class="axis"/>
  <line x1="170" y1="218" x2="92" y2="182" class="axis"/>
  <line x1="170" y1="218" x2="170" y2="72" class="axis"/>

  <!-- Arrowheads -->
  <polygon points="248,182 240,180 242,186" fill="#bbb"/>
  <polygon points="92,182 100,180 98,186" fill="#bbb"/>
  <polygon points="170,72 167,79 173,79" fill="#bbb"/>

  <!-- Axis labels -->
  <text x="254" y="186" class="axis-label">x₁</text>
  <text x="78" y="186" class="axis-label">x₂</text>
  <text x="154" y="68" class="axis-label">x₁ · x₂</text>

  <!-- Tick marks on x3 axis -->
  <line x1="167" y1="218" x2="173" y2="218" stroke="#bbb" stroke-width="0.8"/>
  <text x="160" y="221" class="tick" text-anchor="end">0</text>
  <line x1="167" y1="148" x2="173" y2="148" stroke="#bbb" stroke-width="0.8"/>
  <text x="160" y="151" class="tick" text-anchor="end">1</text>

  <!-- Separating plane at x3=0.5 -->
  <polygon points="170,183 232,155 170,128 108,155" class="plane"/>

  <!-- Vertical lift line from (1,1,0) ghost to (1,1,1) -->
  <line x1="170" y1="168" x2="170" y2="98" class="lift-line"/>

  <!-- Ghost point at original (1,1) position -->
  <circle cx="170" cy="168" r="4.5" class="ghost"/>

  <!-- Three points on the floor (x3=0) -->
  <circle cx="170" cy="218" r="5" class="point-0"/>
  <circle cx="115" cy="193" r="5" class="point-1"/>
  <circle cx="225" cy="193" r="5" class="point-1"/>

  <!-- Lifted point (1,1,1) -->
  <circle cx="170" cy="98" r="5" class="point-0"/>

  <!-- Point labels showing XOR class -->
  <text x="180" y="231" class="anno">
    <tspan style="font-weight:600; fill:#1890ff">0</tspan>
    <tspan style="fill:#999"> (0,0)</tspan>
  </text>
  <text x="80" y="208" class="anno">
    <tspan style="font-weight:600; fill:#fa8c16">1</tspan>
    <tspan style="fill:#999"> (0,1)</tspan>
  </text>
  <text x="232" y="208" class="anno">
    <tspan style="font-weight:600; fill:#fa8c16">1</tspan>
    <tspan style="fill:#999"> (1,0)</tspan>
  </text>
  <text x="180" y="95" class="anno">
    <tspan style="font-weight:600; fill:#1890ff">0</tspan>
    <tspan style="fill:#999"> (1,1)</tspan>
  </text>

  <!-- Plane annotation -->
  <line x1="232" y1="143" x2="210" y2="148" stroke="#999" stroke-width="0.6"/>
  <text x="236" y="140" class="anno" style="fill:#555">separating plane</text>

  <!-- Lift annotation -->
  <text x="185" y="135" class="anno" style="fill:#888; font-style:italic">lifted</text>

  <!-- Title -->
  <text x="170" y="28" class="anno-bold" text-anchor="middle">
    Adding x₃ = x₁ · x₂ lifts one point away from the rest
  </text>

  <!-- Bottom caption -->
  <text x="170" y="266" class="anno" text-anchor="middle">
    A flat plane in 3D now separates the classes
  </text>
</svg>
